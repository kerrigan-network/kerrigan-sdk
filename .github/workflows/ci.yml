name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Build SDK + CLI on all platforms, bridge only on Unix (ZMQ is Unix-only)
      - name: Build (all platforms)
        run: cargo build --release -p kerrigan-sdk -p kerrigan-wallet-cli

      - name: Build bridge (Unix only)
        if: runner.os != 'Windows'
        run: cargo build --release -p kerrigan-bridge

      - name: Test
        run: cargo test -p kerrigan-sdk -p kerrigan-wallet-cli

      - name: Test bridge (Unix only)
        if: runner.os != 'Windows'
        run: cargo test -p kerrigan-bridge

      - name: Clippy
        run: cargo clippy -p kerrigan-sdk -p kerrigan-wallet-cli -- -D warnings

      - name: Clippy bridge (Unix only)
        if: runner.os != 'Windows'
        run: cargo clippy -p kerrigan-bridge -- -D warnings
