[package]
name = "kerrigan-sdk"
version = "0.1.0"
edition = "2021"
description = "Kerrigan Network SDK — pure-Rust transparent wallet primitives"
license = "MIT"

[dependencies]
# Audited cryptographic primitives
secp256k1 = { version = "0.29", features = ["global-context"] }
sha2 = "0.10"
ripemd = "0.1"
hmac = "0.12"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Security
zeroize = { version = "1.8", features = ["derive"] }

# Entropy
getrandom = "0.2"

# Sapling shielded transactions
sapling-crypto = "0.5"
zcash_primitives = "0.26"
zcash_protocol = "0.7"
zcash_keys = { version = "0.12", features = ["sapling"] }
